# Sample camera/profile config for the CCH Data Pipeline MVP.
#
# Exactly one placement mode is allowed per camera:
# - explicit base-arc ID via `arc_id`
# - or coordinate mode via `lat`, `lon`, and `flow_bearing_deg`
#
# `flow_bearing_deg` is the direction of vehicle movement observed by the
# camera, measured clockwise from geographic north. It is not the lens heading.

profiles:
  arterial_rush:
    free_flow_kmh: 45.0
    free_flow_occupancy: 0.18
    peaks:
      - hour: 7.5
        speed_kmh: 14.0
        occupancy: 0.78
      - hour: 17.5
        speed_kmh: 12.0
        occupancy: 0.88

  bridge_evening:
    free_flow_kmh: 55.0
    free_flow_occupancy: 0.12
    peaks:
      - hour: 18.0
        speed_kmh: 16.0
        occupancy: 0.92

  freeflow_local:
    free_flow_kmh: 35.0
    free_flow_occupancy: 0.20
    peaks: []

cameras:
  - id: 1
    label: "Replace with a known directed arc"
    profile: arterial_rush
    arc_id: 42

  - id: 2
    label: "Southbound corridor"
    profile: arterial_rush
    lat: 21.027763
    lon: 105.834160
    flow_bearing_deg: 180.0

  - id: 3
    label: "Eastbound bridge approach"
    profile: bridge_evening
    lat: 21.033500
    lon: 105.850900
    flow_bearing_deg: 90.0

  - id: 4
    label: "Local connector"
    profile: freeflow_local
    lat: 21.020600
    lon: 105.804900
    flow_bearing_deg: 270.0
